<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephen Benjamin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(60, 90, 160, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(120, 60, 160, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(60, 130, 160, 0.08) 0%, transparent 40%);
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4rem 3rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(80, 120, 200, 0.15);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.6rem;
            color: #fff;
        }

        .tagline {
            font-size: 1.05rem;
            font-weight: 300;
            color: #888;
            margin-bottom: 2.5rem;
            letter-spacing: 0.02em;
        }

        .links {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #c0c0c0;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            padding: 0.6rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .links a:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(100, 140, 200, 0.1);
        }

        .links a svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="card">
        <div class="avatar">
            <img src="https://github.com/stbenjam.png" alt="Stephen Benjamin">
        </div>
        <h1>Stephen Benjamin</h1>
        <p class="tagline">Software Developer &middot; Boston Area</p>
        <div class="links">

</body>
</html>
